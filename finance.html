<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百麒物流 - 財務結帳報表</title>
    <style>
        /* 最純粹的 Excel 表格風格 */
        body { font-family: 'Arial', sans-serif; background-color: #fff; color: #000; padding: 20px; font-size: 14px; }
        .filter-section { border: 1px solid #aaa; padding: 15px; margin-bottom: 20px; background-color: #f4f4f4; }
        .filter-item { display: inline-block; margin-right: 20px; margin-bottom: 10px; }
        .filter-item label { font-weight: bold; margin-right: 5px; }
        .filter-item input { padding: 4px 8px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 6px 15px; border: 1px solid #555; background-color: #e0e0e0; cursor: pointer; font-weight: bold; margin-right: 10px; }
        button:hover { background-color: #ccc; }

        .excel-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 8px 10px; text-align: left; }
        .excel-table th { background-color: #e2efda; font-weight: bold; text-align: center; } /* 經典 Excel 綠色表頭 */

        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .total-row { font-weight: bold; background-color: #ffffcc; } /* 總計行底色 */
        .msg-box { padding: 20px; text-align: center; font-weight: bold; border: 1px solid #aaa; margin-top: 20px; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
            .excel-table th, .excel-table td { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

    <div class="no-print filter-section">
        <h2 style="margin-top: 0;">百麒物流 財務結帳查詢</h2>

        <!-- ============================================== -->
        <!-- 💡 篩選控制列：若未來需要增加篩選條件 (例如：品項) -->
        <!-- 💡 可以在此區塊新增下拉選單或 input 標籤          -->
        <!-- ============================================== -->
        <div class="filter-item">
            <label>選擇月份：</label>
            <input type="month" id="monthPicker">
        </div>
        <div class="filter-item">
            <label>搜尋飯店 / 部門：</label>
            <input type="text" id="hotelSearch" placeholder="例如：H2O">
        </div>
        <!-- 範例：未來若要加品項篩選，可以加上這行
        <div class="filter-item">
            <label>品項名稱：</label>
            <input type="text" id="itemSearch" placeholder="例如：床單">
        </div>
        -->

        <br>
        <button onclick="fetchData()">載入報表</button>
        <button onclick="window.print()">列印 / 匯出 PDF</button>
    </div>

    <div id="printHeader" style="text-align: center; margin-bottom: 15px;">
        <h2>飯店點交請款明細表</h2>
        <p id="printInfo" style="margin: 0;"></p>
    </div>

    <div id="resultsContainer">
        <div class="msg-box no-print">請設定條件並點擊「載入報表」按鈕</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";

        window.onload = function() {
            const today = new Date();
            const monthStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthPicker').value = monthStr;
            document.getElementById('printHeader').style.display = 'none'; // 預設隱藏報表標題
        };

        document.getElementById('hotelSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });

        async function fetchData() {
            const month = document.getElementById('monthPicker').value;
            const hotel = document.getElementById('hotelSearch').value.trim();
            const container = document.getElementById('resultsContainer');

            document.getElementById('printHeader').style.display = 'block';
            document.getElementById('printInfo').innerText = `結算月份：${month} ${hotel ? ' | 篩選：' + hotel : ''}`;
            container.innerHTML = `<div class="msg-box no-print">⚙️ 資料讀取與計算中...</div>`;

            try {
                const res = await fetch(`${API_URL}?action=getFinanceData&month=${month}&hotel=${hotel}&t=${new Date().getTime()}`);
                const data = await res.json();

                if(!data.records || data.records.length === 0) {
                    container.innerHTML = `<div class="msg-box no-print" style="color: red;">此條件下找不到任何已簽收的點交紀錄。</div>`;
                    return;
                }

                processData(data.records, data.prices || {});
            } catch(err) {
                container.innerHTML = `<div class="msg-box no-print" style="color: red;">讀取失敗：${err.message}</div>`;
            }
        }

        function processData(records, priceMap) {
            let reportData = [];

            records.forEach(record => {
                let items = [];
                try { items = JSON.parse(record.verifyJson); } catch(e) { return; }

                // 只呈現雙方簽收完畢的帳單
                if (!record.clientSig || !record.driverSig) return;

                let dateStr = record.date || "";
                let deptStr = record.dept || record.deptName || "";

                items.forEach(item => {
                    let qty = parseInt(item.actualQty) || 0;
                    if (qty === 0) return; // 數量為 0 不列入請款

                    let itemName = item.itemName || "";
                    // 從後台抓取對應的單價
                    let unitPrice = priceMap[deptStr + "_" + itemName] !== undefined ? priceMap[deptStr + "_" + itemName] : (priceMap[itemName] || 0);

                    reportData.push({
                        date: dateStr,
                        dept: deptStr,
                        item: itemName,
                        qty: qty,
                        price: unitPrice,
                        note: item.auntNote || item.driverNote || ""
                    });
                });
            });

            if (reportData.length === 0) {
                document.getElementById('resultsContainer').innerHTML = `<div class="msg-box no-print">該月份尚無有效且已簽章的請款項目。</div>`;
                return;
            }

            // 依日期與部門排序
            reportData.sort((a, b) => a.date.localeCompare(b.date) || a.dept.localeCompare(b.dept));

            let grandTotal = 0;
            let rowsHtml = reportData.map(row => {
                let subtotal = row.qty * row.price;
                grandTotal += subtotal;

                return `
                <tr>
                    <td class="text-center">${row.date}</td>
                    <td>${row.dept}</td>
                    <td>${row.item}</td>
                    <td class="text-right">${row.qty}</td>
                    <td class="text-right">${row.price}</td>
                    <td class="text-right">${subtotal.toLocaleString()}</td>
                </tr>
                `;
            }).join('');

            document.getElementById('resultsContainer').innerHTML = `
                <table class="excel-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">點交日期</th>
                            <th>飯店 / 部門</th>
                            <th>品項名稱</th>
                            <th style="width: 80px;">數量</th>
                            <th style="width: 80px;">單價</th>
                            <th style="width: 120px;">金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rowsHtml}
                    </tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td colspan="5" class="text-right">總計金額：</td>
                            <td class="text-right">${grandTotal.toLocaleString()}</td>
                        </tr>
                    </tfoot>
                </table>
            `;
        }
    </script>
</body>
</html>
