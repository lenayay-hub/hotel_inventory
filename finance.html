<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百麒物流 - 財務月結報表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Helvetica Neue', Arial, sans-serif; }
        /* 列印模式設定：隱藏按鈕、調整邊距、優化表格顯示 */
        @media print {
            @page { margin: 1cm; size: A4 portrait; }
            body { background-color: #ffffff; padding: 0 !important; }
            .print-hidden { display: none !important; }
            .shadow-md, .shadow-sm { box-shadow: none !important; }
            .max-w-6xl { max-width: 100% !important; margin: 0 !important; }
            table { border-collapse: collapse !important; width: 100% !important; }
            th, td { border: 1px solid #d1d5db !important; padding: 8px !important; color: #000 !important; }
            th { background-color: #f3f4f6 !important; }
            /* 列印時將輸入框隱形，變成純文字外觀 */
            .price-input { border: none !important; background: transparent !important; color: black !important; font-weight: bold; width: 100%; text-align: right; padding: 0; outline: none; }
            .price-input::-webkit-outer-spin-button, .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
            .price-input[type=number] { -moz-appearance: textfield; }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <!-- 頂部標題區 -->
        <div class="mb-6 text-center print-hidden">
            <h1 class="text-4xl font-black text-blue-900 mb-2">百麒物流 💼 財務結帳報表</h1>
            <p class="text-gray-500 font-bold">自動彙整點交數量，輸入單價即時結算總金額</p>
        </div>

        <!-- 篩選控制列 -->
        <div class="bg-white p-5 rounded-2xl shadow-md mb-8 print-hidden border-t-4 border-blue-600 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                <div class="flex items-center bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 w-full md:w-auto">
                    <span class="text-gray-500 font-bold mr-3">📅 選擇月份</span>
                    <input type="month" id="monthPicker" class="bg-transparent font-bold text-lg outline-none text-blue-800 cursor-pointer w-full">
                </div>

                <div class="flex items-center bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 w-full md:w-auto">
                    <span class="text-gray-500 font-bold mr-3">🔍 搜尋飯店</span>
                    <input type="text" id="hotelSearch" placeholder="例如：H2O..." class="bg-transparent font-bold text-lg outline-none text-blue-800 w-full">
                </div>
            </div>

            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="fetchData()" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl shadow-sm transition">
                    載入報表
                </button>
                <button onclick="window.print()" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl shadow-sm transition flex items-center justify-center gap-2">
                    🖨️ 列印 / 匯出 PDF
                </button>
            </div>
        </div>

        <!-- 列印時顯示的專屬表頭 -->
        <div class="hidden print:block text-center mb-6">
            <h1 class="text-3xl font-black text-gray-900">百麒物流 - 飯店點交請款明細表</h1>
            <p id="printInfo" class="text-lg text-gray-600 font-bold mt-2"></p>
        </div>

        <!-- 報表呈現區 -->
        <div id="resultsContainer">
            <div class="text-center py-20 text-gray-400 font-bold text-xl print-hidden">請點擊上方「載入報表」按鈕開始查詢</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";

        // 本地記憶單價的物件 (讓財務不用每次重打)
        let priceMap = JSON.parse(localStorage.getItem('bq_priceMap')) || {};
        let currentReportData = [];

        window.onload = function() {
            const today = new Date();
            const monthStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthPicker').value = monthStr;
        };

        document.getElementById('hotelSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });

        async function fetchData() {
            const month = document.getElementById('monthPicker').value;
            const hotel = document.getElementById('hotelSearch').value.trim();
            const container = document.getElementById('resultsContainer');
            const printInfo = document.getElementById('printInfo');

            printInfo.innerText = `結算月份：${month} ${hotel ? ' | 飯店名稱：' + hotel : ''}`;
            container.innerHTML = `<div class="text-center py-20 text-blue-600 font-bold text-2xl animate-pulse print-hidden">⚙️ 正在彙整報表資料... 請稍候</div>`;

            try {
                const res = await fetch(`${API_URL}?action=getFinanceData&month=${month}&hotel=${hotel}&t=${new Date().getTime()}`);
                const data = await res.json();

                if(data.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-red-500 font-bold text-2xl print-hidden">此條件下找不到任何點交紀錄。</div>`;
                    return;
                }

                processData(data);
            } catch(err) {
                container.innerHTML = `<div class="text-center py-20 text-xl font-bold text-red-500 print-hidden">網路錯誤或讀取失敗：${err.message}</div>`;
            }
        }

        // 把後台的亂碼解開，變成一行一行的標準資料
        function processData(data) {
            currentReportData = [];
            data.forEach(record => {
                let items = [];
                try { items = JSON.parse(record.verifyJson); } catch(e) { return; }

                // 只抓取已經有雙方簽名的完成單
                let isCompleted = record.clientSig && record.driverSig;
                if (!isCompleted) return;

                items.forEach(item => {
                    // 如果數量是 0，可以選擇不顯示，讓報表更乾淨
                    if (parseInt(item.actualQty) === 0) return;

                    currentReportData.push({
                        date: record.date,
                        dept: record.deptName,
                        item: item.itemName,
                        qty: parseInt(item.actualQty) || 0,
                        note: item.auntNote || item.driverNote || ""
                    });
                });
            });

            // 按照日期與飯店排序
            currentReportData.sort((a, b) => a.date.localeCompare(b.date) || a.dept.localeCompare(b.dept));
            renderReport();
        }

        function updatePrice(itemName, priceVal) {
            priceMap[itemName] = parseInt(priceVal) || 0;
            localStorage.setItem('bq_priceMap', JSON.stringify(priceMap)); // 存回瀏覽器記憶
            renderReport(); // 重新計算總額
        }

        function renderReport() {
            const container = document.getElementById('resultsContainer');
            if (currentReportData.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500 font-bold text-2xl">該月份尚無雙方簽名完成的有效紀錄。</div>`;
                return;
            }

            let grandTotal = 0;
            let rowsHtml = currentReportData.map((row, idx) => {
                let unitPrice = priceMap[row.item] || 0;
                let subtotal = row.qty * unitPrice;
                grandTotal += subtotal;

                return `
                <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                    <td class="p-3 text-center text-gray-600">${row.date}</td>
                    <td class="p-3 font-bold text-gray-800">${row.dept}</td>
                    <td class="p-3 font-bold text-gray-800">${row.item}</td>
                    <td class="p-3 text-right font-black text-blue-700 text-lg">${row.qty}</td>
                    <td class="p-3 text-right">
                        <input type="number" value="${unitPrice || ''}" placeholder="0"
                            onchange="updatePrice('${row.item}', this.value)"
                            class="price-input w-20 p-1 text-right border-b border-gray-300 outline-none text-gray-700 font-bold print:border-none print:bg-transparent">
                    </td>
                    <td class="p-3 text-right font-black text-gray-800 text-lg">NT$ ${subtotal.toLocaleString()}</td>
                </tr>
                `;
            }).join('');

            container.innerHTML = `
            <div class="bg-white shadow-md rounded-xl overflow-hidden border border-gray-200 print:shadow-none print:border-none">
                <table class="w-full text-left border-collapse print:text-sm">
                    <thead>
                        <tr class="bg-gray-800 text-white">
                            <th class="p-4 font-bold text-center w-32 border-r border-gray-700">點交日期</th>
                            <th class="p-4 font-bold border-r border-gray-700">飯店部門</th>
                            <th class="p-4 font-bold border-r border-gray-700">品項</th>
                            <th class="p-4 font-bold text-right w-24 border-r border-gray-700">數量</th>
                            <th class="p-4 font-bold text-right w-28 border-r border-gray-700">單價 (可輸入)</th>
                            <th class="p-4 font-bold text-right w-36">小計金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rowsHtml}
                    </tbody>
                    <tfoot>
                        <tr class="bg-gray-200 border-t-2 border-gray-400">
                            <td colspan="5" class="p-4 text-right font-black text-xl text-gray-800">總計金額：</td>
                            <td class="p-4 text-right font-black text-2xl text-red-600">NT$ ${grandTotal.toLocaleString()}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            `;
        }
    </script>
</body>
</html>
