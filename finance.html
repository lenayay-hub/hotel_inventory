<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百麒物流 - 財務月結對帳系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Helvetica Neue', Arial, sans-serif; }
        /* 列印模式設定：隱藏按鈕、調整邊距、防止卡片被截斷 */
        @media print {
            body { background-color: #ffffff; padding: 0 !important; }
            .print-hidden { display: none !important; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .shadow-md, .shadow-sm { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
            .max-w-5xl { max-width: 100% !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <!-- 頂部標題區 -->
        <div class="mb-8 text-center print-hidden">
            <h1 class="text-4xl font-black text-blue-900 mb-2">百麒物流 💼 財務對帳系統</h1>
            <p class="text-gray-500 font-bold">可查詢每月所有飯店的點交確認明細及雙方簽名檔</p>
        </div>

        <!-- 篩選控制列 (列印時會隱藏) -->
        <div class="bg-white p-5 rounded-2xl shadow-md mb-8 print-hidden border-t-4 border-blue-600 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                <div class="flex items-center bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 w-full md:w-auto">
                    <span class="text-gray-500 font-bold mr-3">📅 選擇月份</span>
                    <input type="month" id="monthPicker" class="bg-transparent font-bold text-lg outline-none text-blue-800 cursor-pointer w-full">
                </div>
                
                <div class="flex items-center bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 w-full md:w-auto">
                    <span class="text-gray-500 font-bold mr-3">🔍 搜尋飯店</span>
                    <input type="text" id="hotelSearch" placeholder="例如：H2O..." class="bg-transparent font-bold text-lg outline-none text-blue-800 w-full">
                </div>
            </div>

            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="fetchData()" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl shadow-sm transition">
                    載入資料
                </button>
                <button onclick="window.print()" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl shadow-sm transition flex items-center justify-center gap-2">
                    🖨️ 列印 / 匯出 PDF
                </button>
            </div>
        </div>

        <!-- 列印時顯示的專屬表頭 -->
        <div class="hidden print:block text-center mb-8 border-b-2 border-gray-800 pb-4">
            <h1 class="text-3xl font-black text-gray-900">百麒物流 - 飯店點交對帳單</h1>
            <p id="printInfo" class="text-lg text-gray-600 font-bold mt-2"></p>
        </div>

        <!-- 對帳單結果呈現區 -->
        <div id="resultsContainer" class="space-y-8">
            <div class="text-center py-20 text-gray-400 font-bold text-xl">請點擊上方「載入資料」按鈕開始查詢</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";

        // 初始化設定預設月份為當月
        window.onload = function() {
            const today = new Date();
            const monthStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthPicker').value = monthStr;
        };

        // 綁定 Enter 鍵觸發搜尋
        document.getElementById('hotelSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });

        async function fetchData() {
            const month = document.getElementById('monthPicker').value;
            const hotel = document.getElementById('hotelSearch').value.trim();
            const container = document.getElementById('resultsContainer');
            const printInfo = document.getElementById('printInfo');
            
            // 更新列印標題
            printInfo.innerText = `結算月份：${month} ${hotel ? ' | 篩選條件：' + hotel : ''}`;
            
            container.innerHTML = `<div class="text-center py-20 text-blue-600 font-bold text-2xl animate-pulse">⚙️ 正在解壓縮後台資料... 請稍候</div>`;
            
            try {
                const res = await fetch(`${API_URL}?action=getFinanceData&month=${month}&hotel=${hotel}&t=${new Date().getTime()}`);
                const data = await res.json();
                
                if(data.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-red-500 font-bold text-2xl">此條件下找不到任何點交紀錄。</div>`;
                    return;
                }
                
                renderData(data);
            } catch(err) {
                container.innerHTML = `<div class="text-center py-20 text-xl font-bold text-red-500">網路錯誤或讀取失敗：${err.message}</div>`;
            }
        }

        function renderData(data) {
            const container = document.getElementById('resultsContainer');
            let html = "";

            data.forEach(record => {
                let items = [];
                try {
                    items = JSON.parse(record.verifyJson);
                } catch(e) { console.error("JSON解析失敗"); }

                // 產生單據明細列表
                let itemsHtml = items.map(item => `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                        <td class="py-3 px-4 font-black text-gray-800 text-lg">${item.itemName}</td>
                        <td class="py-3 px-4 text-center text-gray-400 font-bold text-lg">${item.originalQty}</td>
                        <td class="py-3 px-4 text-center text-blue-700 font-black text-xl bg-blue-50/50">${item.actualQty}</td>
                        <td class="py-3 px-4 text-sm font-bold text-orange-600">${item.auntNote || ''}</td>
                    </tr>
                `).join('');

                // 處理簽名圖片，防呆檢查
                let clientImg = record.clientSig 
                    ? `<img src="${record.clientSig}" class="h-20 w-auto mx-auto object-contain pointer-events-none" />` 
                    : `<div class="h-20 flex items-center justify-center text-gray-300 font-bold">尚未簽收</div>`;
                    
                let driverImg = record.driverSig 
                    ? `<img src="${record.driverSig}" class="h-20 w-auto mx-auto object-contain pointer-events-none" />` 
                    : `<div class="h-20 flex items-center justify-center text-gray-300 font-bold">尚未簽收</div>`;

                html += `
                <div class="bg-white border border-gray-200 shadow-sm rounded-2xl p-6 mb-8 break-inside-avoid">
                    <!-- 對帳單標頭 -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-gray-800 pb-4 mb-4 gap-4">
                        <div>
                            <h2 class="text-2xl font-black text-gray-900">${record.deptName}</h2>
                            <p class="text-sm font-bold text-gray-400 mt-1">系統紀錄編號：${record.confirmTime}</p>
                        </div>
                        <div class="bg-gray-100 px-4 py-2 rounded-lg text-right w-full md:w-auto border border-gray-300">
                            <div class="text-sm text-gray-500 font-bold">點交日期</div>
                            <div class="text-xl font-black text-blue-900">${record.date}</div>
                        </div>
                    </div>

                    <!-- 點交明細表 -->
                    <div class="overflow-x-auto mb-6">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-800 text-white">
                                    <th class="p-3 font-bold rounded-tl-lg">布品名稱</th>
                                    <th class="p-3 font-bold text-center w-24 text-gray-300 text-sm">阿姨盤點量</th>
                                    <th class="p-3 font-bold text-center w-28 text-yellow-300">飯店實收量</th>
                                    <th class="p-3 font-bold rounded-tr-lg w-1/3">備註說明</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itemsHtml}
                            </tbody>
                        </table>
                    </div>

                    <!-- 雙方簽章區 -->
                    <div class="flex gap-4 border-t-2 border-dashed border-gray-200 pt-6">
                        <div class="w-1/2 text-center bg-gray-50 rounded-xl border border-gray-200 p-4">
                            <div class="font-bold text-gray-500 mb-2 border-b border-gray-200 pb-2">🏨 飯店主管簽收確認</div>
                            ${clientImg}
                        </div>
                        <div class="w-1/2 text-center bg-gray-50 rounded-xl border border-gray-200 p-4">
                            <div class="font-bold text-gray-500 mb-2 border-b border-gray-200 pb-2">🚚 百麒物流簽收確認</div>
                            ${driverImg}
                        </div>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
