<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
        .locked-card { opacity: 0.5; pointer-events: none; filter: grayscale(50%); }
    </style>
</head>
<body class="p-3 pb-32 relative">
    
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000]">
        已成功送出！
    </div>

    <div id="editScreen" class="main-container">
        
        <!-- ★ 加入手動同步按鈕 -->
        <div class="flex justify-between items-center mb-4 mt-2 px-1">
            <h1 class="text-2xl font-bold text-gray-800">飯店布品盤點系統</h1>
            <button onclick="init()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg font-bold text-sm shadow-sm active:bg-blue-200 flex items-center gap-1">
                <span>🔄</span> 雲端同步
            </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-col gap-3 box-border">
            <!-- 完美高度統一：h-14 -->
            <div class="relative w-full bg-gray-200 rounded-lg h-14 flex items-center justify-center">
                <div id="dateDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer box-border" onchange="dateChanged()">
            </div>

            <!-- 強制隱藏下拉箭頭，置中對齊 -->
            <div class="relative w-full bg-gray-200 rounded-lg h-14 flex items-center justify-center">
                <select id="hotelSelect" class="w-full h-full bg-transparent font-bold text-xl px-4 outline-none text-center text-gray-900" style="-webkit-appearance: none; appearance: none;" onchange="renderItems()">
                    <option value="">載入中...</option>
                </select>
            </div>
            
            <div class="relative w-full h-14">
                <span class="absolute left-3 top-4 text-gray-400 text-xl">🔍</span>
                <input id="searchInput" class="w-full h-full border border-gray-300 rounded-lg text-lg pl-10 pr-4 outline-none box-border" placeholder="搜尋飯店名稱..." oninput="renderItems()">
            </div>
        </div>

        <div id="itemsList" class="space-y-3">
            <div id="loadingStatus" class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>
        </div>

        <div class="bg-white p-4 rounded-xl border-2 border-dashed border-gray-300 mt-5 mb-5">
            <h2 class="font-bold text-sm mb-2 text-gray-700">新增臨時品項</h2>
            <div class="flex gap-2">
                <input id="newItemInput" class="flex-1 p-2 border rounded-md text-base" placeholder="布品名稱">
                <button onclick="addNewItem()" class="p-2 bg-green-600 text-white rounded-md font-bold text-sm px-4">新增</button>
            </div>
        </div>

        <button onclick="showPreview()" class="w-full p-4 bg-gray-800 text-white rounded-xl font-bold text-lg shadow-lg mb-8">
            📸 產生今日截圖預覽
        </button>
    </div>

    <!-- 截圖預覽畫面 -->
    <div id="previewScreen" class="hidden fixed inset-0 bg-white z-[9999] overflow-y-auto">
        <div class="p-4 flex justify-between items-center border-b border-gray-200 bg-gray-50">
            <button onclick="hidePreview()" class="text-blue-600 font-bold text-lg px-2 py-1">← 返回編輯</button>
            <span class="text-gray-400 text-sm">請直接使用手機截圖</span>
        </div>
        <div id="previewContent" class="p-6 max-w-md mx-auto bg-white min-h-screen"></div>
    </div>

    <!-- 簽名視窗 -->
    <div id="signModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <h2 class="text-lg font-bold mb-3 text-center text-gray-800">請在下方簽名</h2>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4">
                <button onclick="submitData()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md active:bg-blue-800">確定傳送</button>
            </div>
        </div>
    </div>

    <script>
        // ★ 這裡請確認是您最新的 Google Apps Script 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbwJv-qdQcoqowK1JYqSttVGYiSh0nW-SO1-6N_D9pSHok36i7XMt_uL_oRMKJGxFWw/exec";
        
        let masterData = [];
        let userInputs = {}; 
        let activeHotel = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        // ★ 時差修復：確保取得台灣本地時間的 YYYY-MM-DD
        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            setupDateLimits();
            const listDiv = document.getElementById('itemsList');
            // 按下同步時，強制顯示載入中動畫
            listDiv.innerHTML = '<div class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>';
            
            try {
                const noCacheUrl = `${API_URL}?action=getData&t=${new Date().getTime()}`;
                const res = await fetch(noCacheUrl);
                
                if (!res.ok) throw new Error(`連線錯誤狀態碼: ${res.status}`);
                
                const data = await res.json();
                
                if (data.template && Array.isArray(data.template)) {
                    masterData = data.template;
                } else if (data.data && Array.isArray(data.data)) {
                    masterData = data.data;
                } else if (Array.isArray(data)) {
                    masterData = data;
                } else {
                    throw new Error("回傳格式不正確");
                }

                if (masterData.length === 0) throw new Error("「基礎設定」內沒有找到飯店資料");
                
                userInputs = {};
                if (data.records && Array.isArray(data.records)) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        userInputs[r.date][r.hotel][r.item] = { count: r.count, note: r.note };
                    });
                }

                const hotels = [...new Set(masterData.map(d => d.hotel))];
                const hotelSelect = document.getElementById('hotelSelect');
                
                // 只有在還沒選擇飯店，或是重新載入時，才預設選第一間
                if (hotels.length > 0 && !hotelSelect.value) {
                    hotelSelect.innerHTML = hotels.map(h => `<option value="${h}">${h}</option>`).join('');
                    hotelSelect.value = hotels[0]; 
                } else if (hotels.length > 0) {
                    // 保留原本選好的飯店，只更新列表
                    hotelSelect.innerHTML = hotels.map(h => `<option value="${h}">${h}</option>`).join('');
                }
                
                renderItems();
            } catch (error) {
                listDiv.innerHTML = `
                    <div class="text-red-500 mb-2 text-center mt-6">讀取失敗 😭</div>
                    <div class="text-sm text-gray-500 px-4 text-center">${error.message}</div>
                    <div class="text-center"><button onclick="init()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold">點我重試</button></div>
                `;
            }
        }

        function setupDateLimits() {
            const today = new Date();
            const prevMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            const nextMonth = new Date(today.getFullYear(), today.getMonth() + 2, 0); 
            
            const dp = document.getElementById('datePicker');
            dp.min = getLocalDateString(prevMonth);
            dp.max = getLocalDateString(nextMonth);
            // 避免跳回前一天
            dp.value = getLocalDateString(today);
            updateDateDisplay();
        }

        function dateChanged() { updateDateDisplay(); renderItems(); }
        function updateDateDisplay() {
            const dateVal = document.getElementById('datePicker').value;
            if(!dateVal) return;
            const d = new Date(dateVal);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function isLocked() {
            const selected = new Date(document.getElementById('datePicker').value);
            const today = new Date();
            today.setHours(0,0,0,0); selected.setHours(0,0,0,0);
            return ((today - selected) / 86400000) > 2;
        }

        function handleInput(date, hotel, item, field, value) {
            if (!userInputs[date]) userInputs[date] = {};
            if (!userInputs[date][hotel]) userInputs[date][hotel] = {};
            if (!userInputs[date][hotel][item]) userInputs[date][hotel][item] = { count: '', note: '' };
            userInputs[date][hotel][item][field] = value;
        }

        function renderItems() {
            const dateStr = document.getElementById('datePicker').value;
            const dropdownHotel = document.getElementById('hotelSelect').value;
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const locked = isLocked();
            
            let filteredData = masterData;
            if (search) {
                filteredData = masterData.filter(d => d.hotel.toLowerCase().includes(search));
            } else {
                filteredData = masterData.filter(d => d.hotel === dropdownHotel);
            }
            
            if (filteredData.length === 0) {
                document.getElementById('itemsList').innerHTML = '<div class="text-center py-10 text-gray-500 font-bold">無符合資料</div>';
                return;
            }

            document.getElementById('itemsList').innerHTML = filteredData.map(d => {
                const savedCount = userInputs[dateStr]?.[d.hotel]?.[d.item]?.count || '';
                const savedNote = userInputs[dateStr]?.[d.hotel]?.[d.item]?.note || '';
                
                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 ${locked ? 'locked-card' : ''}">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex flex-col">
                            ${search ? `<span class="text-sm text-blue-500 font-bold mb-1">${d.hotel}</span>` : ''}
                            <span class="font-bold text-2xl text-gray-900">${d.item}</span>
                        </div>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" 
                            oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'count', this.value)" 
                            value="${savedCount}" 
                            ${locked ? 'disabled' : ''}
                            class="w-20 p-1 text-right font-black text-2xl border-b-2 border-blue-400 bg-transparent outline-none text-blue-600" placeholder="0">
                    </div>
                    <input type="text" 
                        oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'note', this.value)" 
                        value="${savedNote}" 
                        ${locked ? 'disabled' : ''}
                        class="w-full p-1.5 mb-2 border border-gray-200 rounded text-sm bg-gray-50 outline-none" placeholder="備註...">
                    <button onclick="openSign('${d.hotel}', '${d.item}')" ${locked ? 'disabled' : ''} class="w-full py-1.5 bg-blue-600 text-white rounded font-bold text-sm shadow-sm active:bg-blue-800">簽名確認</button>
                </div>
            `}).join('');
        }

        function addNewItem() {
            const val = document.getElementById('newItemInput').value;
            const hotel = document.getElementById('hotelSelect').value;
            if(val && hotel) {
                masterData.push({hotel: hotel, item: val});
                document.getElementById('newItemInput').value = "";
                renderItems();
            }
        }

        function showPreview() {
            const hotel = document.getElementById('hotelSelect').value;
            const dateStr = document.getElementById('datePicker').value;
            const displayDate = document.getElementById('dateDisplay').innerText;
            
            let html = `
                <div class="text-center mb-6 pb-4 border-b-2 border-black">
                    <h2 class="text-3xl font-black text-gray-900 mb-1">${hotel}</h2>
                    <p class="text-lg text-gray-600 font-bold">${displayDate} 盤點表</p>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-gray-800 text-gray-700">
                            <th class="py-2 text-lg">品項</th>
                            <th class="py-2 text-lg text-right">數量</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            let hasData = false;
            masterData.filter(d => d.hotel === hotel).forEach(d => {
                const count = userInputs[dateStr]?.[hotel]?.[d.item]?.count;
                const note = userInputs[dateStr]?.[hotel]?.[d.item]?.note;
                
                if (count && count !== "0" && String(count).trim() !== "") {
                    hasData = true;
                    html += `
                        <tr class="border-b border-gray-200">
                            <td class="py-4">
                                <span class="font-bold text-2xl text-gray-900">${d.item}</span>
                                ${note ? `<div class="text-sm text-gray-500 mt-1">📝 備註：${note}</div>` : ''}
                            </td>
                            <td class="py-4 font-black text-3xl text-right text-blue-700">${count}</td>
                        </tr>
                    `;
                }
            });

            if (!hasData) html += `<tr><td colspan="2" class="py-10 text-center text-gray-400 text-lg">無盤點資料</td></tr>`;
            html += `</tbody></table>`;
            
            document.getElementById('previewContent').innerHTML = html;
            document.getElementById('editScreen').classList.add('hidden');
            document.getElementById('previewScreen').classList.remove('hidden');
        }

        function hidePreview() {
            document.getElementById('previewScreen').classList.add('hidden');
            document.getElementById('editScreen').classList.remove('hidden');
        }

        function start(e) { painting = true; draw(e); }
        function draw(e) {
            if(!painting) return;
            e.preventDefault(); 
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }
        function stop() { painting = false; ctx.beginPath(); }

        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);

        function closeSign() { document.getElementById('signModal').classList.add('hidden'); }

        function openSign(hotel, item) { 
            activeHotel = hotel;
            activeItem = item; 
            document.getElementById('signModal').classList.remove('hidden'); 
            requestAnimationFrame(() => {
                canvas.width = canvas.offsetWidth;
                canvas.height = 220;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => { toast.classList.add('opacity-0'); }, 2000);
        }

        function submitData() {
            const dateStr = document.getElementById('datePicker').value;
            const countVal = userInputs[dateStr]?.[activeHotel]?.[activeItem]?.count || 0;
            const noteVal = userInputs[dateStr]?.[activeHotel]?.[activeItem]?.note || '';
            
            if(!countVal || countVal === "0" || String(countVal).trim() === "") {
                alert("請先填寫數量！");
                return;
            }

            const payload = { 
                date: dateStr,
                hotel: activeHotel,
                item: activeItem, 
                count: countVal, 
                note: noteVal, 
                timestamp: new Date().toLocaleString() 
            };
            
            closeSign();
            showToast(`✅ ${activeItem} 已送出`);
            
            fetch(`${API_URL}?t=${new Date().getTime()}`, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(payload) 
            }).then(() => {
                // 送出後，稍微等一下自動再同步一次，確保最新資料有進來
                setTimeout(init, 1500);
            });
        }

        // 啟動系統
        init();
    </script>
</body>
</html>
