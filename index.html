<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
        /* 鎖定狀態的視覺樣式 */
        .locked-input { background-color: #f3f4f6 !important; color: #9ca3af !important; border-color: #e5e7eb !important; pointer-events: none; }
    </style>
</head>
<body class="p-3 pb-32 relative">
    
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000]">
        已成功寫入資料庫！
    </div>

    <div class="main-container">
        <div class="flex justify-between items-center mb-4 mt-2 px-1">
            <h1 class="text-2xl font-bold text-gray-800">布品盤點系統</h1>
            <button onclick="init()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg font-bold text-sm shadow-sm">
                🔄 雲端同步
            </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-col gap-3">
            <div class="relative w-full bg-gray-100 rounded-lg h-14 flex items-center justify-center border border-gray-200">
                <div id="dateDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="dateChanged()">
            </div>
            
            <div class="relative w-full h-14">
                <span class="absolute left-3 top-4 text-gray-400 text-xl">🔍</span>
                <input id="searchInput" class="w-full h-full border border-gray-300 rounded-lg text-lg pl-10 pr-4 outline-none" placeholder="搜尋飯店或部門..." oninput="filterHotels()">
            </div>

            <div class="relative w-full bg-blue-50 border border-blue-200 rounded-lg h-14 flex items-center justify-center overflow-hidden">
                <div id="hotelDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-blue-800">載入中...</div>
                <select id="hotelSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="document.getElementById('hotelDisplay').innerText = this.options[this.selectedIndex].text; renderItems()">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <div id="itemsList" class="space-y-3">
            <div class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>
        </div>
    </div>

    <!-- 簽名板 Modal -->
    <div id="signModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-gray-800">請先簽名以解鎖輸入框</h2>
                <button onclick="clearCanvas()" class="text-sm text-red-500 font-bold px-2 py-1 rounded bg-red-50">清除重寫</button>
            </div>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4 flex gap-2">
                <button onclick="closeSign()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-lg">取消</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md">確認簽名</button>
            </div>
        </div>
    </div>

    <script>
        // ★★★ 維持您的專屬 API 網址 ★★★
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";
        
        let masterData = []; 
        let userInputs = {}; 
        let allCategories = []; 
        let activeCategory = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            document.getElementById('datePicker').value = getLocalDateString(new Date());
            updateDateDisplay();
            
            try {
                const res = await fetch(`${API_URL}?action=getInventoryData&t=${new Date().getTime()}`);
                const data = await res.json();
                
                masterData = data.template || [];
                if (masterData.length === 0) throw new Error("後台大腦「基礎設定」分頁尚未填寫資料！");
                
                if (data.records) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        
                        // 狀態判斷：只要有數量，就代表已經「送出完成」；只要有簽名或數量，代表已「解鎖簽名」
                        let isSub = r.count && String(r.count).trim() !== "" ? true : false;
                        let hasSig = r.signature || isSub ? true : false; 

                        userInputs[r.date][r.hotel][r.item] = { 
                            count: r.count, 
                            note: r.note, 
                            hasSigned: hasSig, 
                            isSubmitted: isSub,
                            signature: r.signature || "" 
                        };
                    });
                }
                allCategories = [...new Set(masterData.map(d => d.hotel))];
                filterHotels(); 
            } catch (error) {
                document.getElementById('itemsList').innerHTML = `<div class="text-red-500 text-center mt-6 font-bold">同步失敗 😭</div><div class="text-xs text-gray-400 text-center px-4 mt-1">${error.message}</div>`;
            }
        }

        function dateChanged() { updateDateDisplay(); renderItems(); }
        function updateDateDisplay() {
            const d = new Date(document.getElementById('datePicker').value);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function filterHotels() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = allCategories.filter(c => c.toLowerCase().includes(keyword));
            const select = document.getElementById('hotelSelect');
            if (filtered.length > 0) {
                select.innerHTML = filtered.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('hotelDisplay').innerText = filtered[0];
            } else {
                select.innerHTML = '<option value="">無符合結果</option>';
                document.getElementById('hotelDisplay').innerText = "無符合結果";
            }
            renderItems();
        }

        function handleInput(date, category, item, field, value) {
            if (!userInputs[date]) userInputs[date] = {};
            if (!userInputs[date][category]) userInputs[date][category] = {};
            if (!userInputs[date][category][item]) userInputs[date][category][item] = { count: '', note: '', hasSigned: false, isSubmitted: false, signature: '' };
            userInputs[date][category][item][field] = value;
        }

        function renderItems() {
            const dateStr = document.getElementById('datePicker').value;
            const cat = document.getElementById('hotelSelect').value;
            if (!cat) return;

            const filteredData = masterData.filter(d => d.hotel === cat);
            document.getElementById('itemsList').innerHTML = filteredData.map(d => {
                const count = userInputs[dateStr]?.[d.hotel]?.[d.item]?.count || '';
                const note = userInputs[dateStr]?.[d.hotel]?.[d.item]?.note || '';
                const hasSigned = userInputs[dateStr]?.[d.hotel]?.[d.item]?.hasSigned || false;
                const isSubmitted = userInputs[dateStr]?.[d.hotel]?.[d.item]?.isSubmitted || false;
                
                // 動態按鈕與狀態
                let actionButton = "";
                let inputStateClass = hasSigned ? "bg-transparent text-blue-600 border-blue-400" : "locked-input";
                let noteStateClass = hasSigned ? "bg-gray-50 text-gray-800" : "locked-input";
                let placeholderText = hasSigned ? "0" : "🔒";
                let notePlaceholderText = hasSigned ? "有破損或短少？請寫備註..." : "🔒 請先簽名解鎖...";

                if (isSubmitted) {
                    actionButton = `<button onclick="submitItem('${d.hotel}', '${d.item}')" class="w-full py-2 bg-green-600 text-white rounded-lg font-bold shadow-sm">✅ 已成功送出 (可修改後再次送出)</button>`;
                } else if (hasSigned) {
                    actionButton = `<button onclick="submitItem('${d.hotel}', '${d.item}')" class="w-full py-3 bg-orange-500 text-white rounded-lg font-bold shadow-md animate-pulse text-lg">📤 第二步：確認數量並送出</button>`;
                } else {
                    actionButton = `<button onclick="openSign('${d.hotel}', '${d.item}')" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold shadow-sm">✍️ 第一步：點此簽名解鎖</button>`;
                }

                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-2xl text-gray-900">${d.item}</span>
                        <input type="text" inputmode="numeric" 
                            oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'count', this.value)" 
                            value="${count}" 
                            ${!hasSigned ? 'disabled' : ''}
                            class="w-20 p-1 text-right font-black text-2xl border-b-2 outline-none ${inputStateClass}" 
                            placeholder="${placeholderText}">
                    </div>
                    <input type="text" 
                        oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'note', this.value)" 
                        value="${note}" 
                        ${!hasSigned ? 'disabled' : ''}
                        class="w-full p-2 mb-3 border border-gray-200 rounded-lg text-sm outline-none ${noteStateClass}" 
                        placeholder="${notePlaceholderText}">
                    ${actionButton}
                </div>`;
            }).join('');
        }

        function setupCanvas() {
            canvas.isModified = false;
            function start(e) { painting = true; draw(e); }
            function draw(e) {
                if(!painting) return; e.preventDefault(); 
                canvas.isModified = true;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            }
            function stop() { painting = false; ctx.beginPath(); }
            canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);
        }
        setupCanvas();

        function clearCanvas() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            canvas.isModified = true;
        }
        function closeSign() { document.getElementById('signModal').classList.add('hidden'); }
        
        function openSign(category, item) { 
            activeCategory = category; activeItem = item; 
            document.getElementById('signModal').classList.remove('hidden'); 

            const dateStr = document.getElementById('datePicker').value;
            const existingSig = userInputs[dateStr]?.[category]?.[item]?.signature;

            requestAnimationFrame(() => {
                canvas.width = canvas.offsetWidth; canvas.height = 220;
                canvas.isModified = false; 
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; 
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (existingSig) {
                    let img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = existingSig;
                }
            });
        }

        // 新增：只確認簽名，不立刻送出，而是解鎖輸入框
        function confirmSignature() {
            const dateStr = document.getElementById('datePicker').value;
            const existingSig = userInputs[dateStr]?.[activeCategory]?.[activeItem]?.signature || '';
            
            let isBlank = !ctx.getImageData(0,0,canvas.width,canvas.height).data.some(c => c !== 0);
            
            if (isBlank && !existingSig) {
                return alert("請先在空白處簽名，才能解鎖輸入框喔！");
            }

            let sigBase64 = isBlank ? existingSig : canvas.toDataURL();
            
            handleInput(dateStr, activeCategory, activeItem, 'signature', sigBase64);
            handleInput(dateStr, activeCategory, activeItem, 'hasSigned', true); // 標記為已簽名(解鎖)
            
            closeSign();
            renderItems(); // 重新渲染，此時輸入框就會亮起解鎖
        }

        // 修改：獨立的送出按鈕，檢查數量與簽名
        function submitItem(category, item) {
            const dateStr = document.getElementById('datePicker').value;
            const countVal = userInputs[dateStr]?.[category]?.[item]?.count || 0;
            const noteVal = userInputs[dateStr]?.[category]?.[item]?.note || '';
            const sigBase64 = userInputs[dateStr]?.[category]?.[item]?.signature || '';
            
            if(!countVal || countVal === "0" || String(countVal).trim() === "") {
                return alert("簽名已完成解鎖！\n請填寫「盤點數量」後再按下送出！");
            }
            if(!sigBase64) {
                return alert("系統異常：找不到您的簽名，請重新簽名！");
            }

            // 尋找按鈕並變成載入中狀態 (利用事件物件或重新渲染來防連點)
            const payload = { 
                type: 'inventory', 
                date: dateStr, 
                hotel: category, 
                item: item, 
                count: countVal, 
                note: noteVal, 
                signature: sigBase64,
                timestamp: new Date().toLocaleString() 
            };
            
            fetch(API_URL, { 
                method: 'POST',
                mode: 'no-cors',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            })
            .then(() => {
                handleInput(dateStr, category, item, 'isSubmitted', true); // 標記為已成功送出
                renderItems();
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0'); 
                setTimeout(() => toast.classList.add('opacity-0'), 2000);
            })
            .catch(err => {
                // 離線防護
                handleInput(dateStr, category, item, 'isSubmitted', true);
                renderItems();
                alert("網路不穩！但資料已暫存於手機，請在網路良好時重整頁面確認。");
            });
        }
        
        init();
    </script>
</body>
</html>
