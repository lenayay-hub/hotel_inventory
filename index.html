<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
        
        /* 專屬計算機鍵盤的滑動動畫 */
        #calcModal { transition: transform 0.3s ease-in-out; }
        .calc-btn { user-select: none; transition: background 0.1s; }
        .calc-btn:active { background-color: #d1d5db; transform: scale(0.95); }
    </style>
</head>
<body class="p-3 pb-32 relative overflow-x-hidden">
    
    <!-- 輕提示 (Toast) -->
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-green-700 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000] font-bold">
        ✅ 動作已完成！
    </div>

    <!-- 專屬溫馨提示框 (取代原生的 alert) -->
    <div id="msgModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[20000]">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <div id="msgIcon" class="text-6xl mb-4">⚠️</div>
            <h3 id="msgText" class="text-xl font-bold text-gray-800 mb-6 leading-relaxed whitespace-pre-line">請先簽名</h3>
            <button onclick="closeMsg()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-xl shadow-md active:bg-blue-700">我知道了</button>
        </div>
    </div>

    <div class="main-container">
        
        <!-- ==================== 【首頁：飯店選擇入口】 ==================== -->
        <div id="homeView">
            <div class="flex justify-between items-center mb-6 mt-2 px-1">
                <h1 class="text-3xl font-black text-gray-800">首頁：選擇飯店</h1>
                <button onclick="init()" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-xl font-bold text-base shadow-sm active:bg-blue-200">
                    🔄 雲端同步
                </button>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 flex flex-col gap-4 border border-gray-200">
                <div class="text-gray-500 font-bold text-lg mb-1">🔍 快速尋找您要盤點的飯店：</div>
                
                <!-- 大字體搜尋框 -->
                <div class="relative w-full h-16">
                    <span class="absolute left-4 top-4 text-gray-400 text-2xl">🔍</span>
                    <input id="searchInput" class="w-full h-full border-2 border-blue-200 focus:border-blue-500 rounded-xl text-xl font-bold pl-12 pr-4 outline-none" placeholder="輸入關鍵字..." oninput="renderHome()">
                </div>

                <!-- 大字體下拉選單 -->
                <div class="relative w-full bg-blue-50 border-2 border-blue-200 rounded-xl h-16 flex items-center justify-center overflow-hidden">
                    <div id="homeSelectDisplay" class="w-full text-center font-black text-xl pointer-events-none text-blue-800">-- 點此展開清單 --</div>
                    <select id="homeSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="goToHotel(this.value)">
                        <option value="">載入中...</option>
                    </select>
                </div>
            </div>

            <!-- 大型飯店按鈕網格 -->
            <div id="hotelGrid" class="grid grid-cols-2 gap-4 pb-10">
                <div class="col-span-2 text-center py-10 text-gray-500 font-bold text-xl">資料同步中...</div>
            </div>
        </div>

        <!-- ==================== 【內頁：飯店盤點與新增品項】 ==================== -->
        <div id="hotelView" class="hidden">
            <!-- 頂部導航列：回首頁與標題 -->
            <div class="flex items-center gap-3 mb-6 mt-2">
                <button onclick="goHome()" class="bg-gray-800 text-white px-4 py-3 rounded-xl font-black text-lg shadow-md active:bg-gray-700 flex-shrink-0">
                    ⬅️ 回首頁
                </button>
                <h1 id="currentHotelTitle" class="text-2xl font-black text-blue-900 bg-blue-100 px-4 py-3 rounded-xl flex-1 text-center truncate shadow-sm">
                    飯店名稱
                </h1>
            </div>

            <!-- 日期選擇 (保留在內頁) -->
            <div class="bg-white p-2 rounded-xl shadow-sm mb-5 border border-gray-200">
                <div class="relative w-full bg-gray-50 rounded-lg h-14 flex items-center justify-center">
                    <span class="absolute left-4 text-xl">📅</span>
                    <div id="dateDisplay" class="w-full text-center font-black text-xl pointer-events-none text-gray-800">載入中...</div>
                    <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="dateChanged()">
                </div>
            </div>

            <!-- 盤點項目列表 -->
            <div id="itemsList" class="space-y-4"></div>

            <!-- 🌟 新增臨時品項區塊 -->
            <div class="mt-8 bg-blue-50 p-5 rounded-2xl shadow-sm border-2 border-dashed border-blue-300">
                <h2 class="text-xl font-black mb-3 text-blue-800">➕ 找不到品項？自己新增</h2>
                <div class="flex gap-2">
                    <input id="newItemInput" class="flex-1 p-4 text-xl font-bold border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500" placeholder="輸入新布品名稱...">
                    <button onclick="addNewItem()" class="p-4 bg-green-600 text-white rounded-xl font-black text-xl shadow-md active:bg-green-700 whitespace-nowrap">新增</button>
                </div>
            </div>
            <div class="h-10"></div>
        </div>
    </div>

    <!-- 簽名板 Modal (強制簽名) -->
    <div id="signModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-3xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h2 id="signModalTitle" class="text-lg font-black text-blue-800">✍️ 簽名解鎖輸入框</h2>
                <button onclick="clearCanvas()" class="text-sm text-red-500 font-bold px-3 py-2 rounded-lg bg-red-50 border border-red-200 shadow-sm active:bg-red-100">清除重寫</button>
            </div>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4 flex gap-2">
                <button onclick="closeSign()" class="flex-1 py-4 bg-gray-200 text-gray-700 rounded-xl font-bold text-xl">取消</button>
                <button onclick="confirmSignature()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold text-xl shadow-md active:bg-blue-700">確認簽名</button>
            </div>
        </div>
    </div>

    <!-- 專屬底部計算機鍵盤 Modal -->
    <div id="calcModal" class="fixed inset-x-0 bottom-0 transform translate-y-full bg-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.2)] rounded-t-3xl z-[10001] max-w-md mx-auto">
        <div class="p-4">
            <div class="flex justify-between items-center mb-3">
                <span id="calcTitle" class="font-bold text-gray-500 text-base">正在計算：床單</span>
                <button onclick="closeCalc()" class="text-red-600 font-bold px-4 py-2 bg-red-100 rounded-lg active:bg-red-200">關閉</button>
            </div>
            <!-- 算式顯示區 -->
            <div id="calcDisplay" class="w-full bg-white border-2 border-blue-400 rounded-xl h-16 mb-4 flex items-center justify-end px-4 text-4xl font-black text-gray-800 tracking-wider overflow-hidden">
                0
            </div>
            <!-- 鍵盤按鈕區 -->
            <div class="grid grid-cols-4 gap-2 h-64">
                <button onclick="calcPress('7')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">7</button>
                <button onclick="calcPress('8')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">8</button>
                <button onclick="calcPress('9')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">9</button>
                <button onclick="calcPress('+')" class="calc-btn bg-blue-100 text-blue-700 rounded-xl text-4xl font-black shadow-sm border border-blue-200">＋</button>
                
                <button onclick="calcPress('4')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">4</button>
                <button onclick="calcPress('5')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">5</button>
                <button onclick="calcPress('6')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">6</button>
                <button onclick="calcPress('-')" class="calc-btn bg-red-100 text-red-700 rounded-xl text-4xl font-black shadow-sm border border-red-200">－</button>
                
                <button onclick="calcPress('1')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">1</button>
                <button onclick="calcPress('2')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">2</button>
                <button onclick="calcPress('3')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">3</button>
                <button onclick="calcBackspace()" class="calc-btn bg-gray-200 text-gray-700 rounded-xl text-xl font-bold shadow-sm active:bg-gray-300">退格</button>
                
                <button onclick="calcClear()" class="calc-btn bg-gray-200 text-gray-700 rounded-xl text-xl font-bold shadow-sm active:bg-gray-300">清除</button>
                <button onclick="calcPress('0')" class="calc-btn bg-white rounded-xl text-3xl font-bold shadow-sm border border-gray-200">0</button>
                <button onclick="calcConfirm()" class="calc-btn col-span-2 bg-green-600 text-white rounded-xl text-2xl font-black shadow-sm active:bg-green-700">確定並儲存</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";
        
        let masterData = []; 
        let userInputs = {}; 
        let allCategories = []; 
        let currentHotelName = ""; // 當前進入的飯店
        let activeCategory = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let calcExpr = "";

        // 客製化彈窗 (取代 Alert)
        function showMessage(text, isError = true) {
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgIcon').innerText = isError ? "⚠️" : "💡";
            document.getElementById('msgModal').classList.remove('hidden');
        }
        function closeMsg() {
            document.getElementById('msgModal').classList.add('hidden');
        }
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.remove('opacity-0'); 
            setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }

        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            document.getElementById('datePicker').value = getLocalDateString(new Date());
            updateDateDisplay();
            
            // 回到首頁並顯示載入中
            goHome();
            document.getElementById('hotelGrid').innerHTML = `<div class="col-span-2 text-center py-10 text-blue-600 font-bold text-2xl animate-pulse">🔄 資料同步中...</div>`;
            
            try {
                const res = await fetch(`${API_URL}?action=getInventoryData&t=${new Date().getTime()}`);
                const data = await res.json();
                
                masterData = data.template || [];
                if (masterData.length === 0) throw new Error("後台無資料");
                
                if (data.records) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        
                        let isSub = r.count && String(r.count).trim() !== "" ? true : false;
                        let hasSig = false; // 初始強制未解鎖狀態

                        userInputs[r.date][r.hotel][r.item] = { 
                            count: r.count, note: r.note, hasSigned: hasSig, isSubmitted: isSub, signature: r.signature || "" 
                        };
                    });
                }
                allCategories = [...new Set(masterData.map(d => d.hotel))];
                renderHome(); // 繪製首頁大按鈕
            } catch (error) {
                document.getElementById('hotelGrid').innerHTML = `<div class="col-span-2 text-red-500 text-center mt-6 font-bold text-2xl">❌ 網路連線失敗，請重試</div>`;
            }
        }

        // ================= 【首頁邏輯】 =================
        function renderHome() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = allCategories.filter(c => c.toLowerCase().includes(keyword));
            
            // 處理下拉選單
            const select = document.getElementById('homeSelect');
            if (filtered.length > 0) {
                select.innerHTML = '<option value="">-- 點擊選擇飯店 --</option>' + filtered.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('homeSelectDisplay').innerText = "-- 點此展開清單 --";
            } else {
                select.innerHTML = '<option value="">無符合結果</option>';
                document.getElementById('homeSelectDisplay').innerText = "找不到相關飯店";
            }

            // 處理大按鈕網格
            const grid = document.getElementById('hotelGrid');
            if (filtered.length > 0) {
                grid.innerHTML = filtered.map(c => `
                    <button onclick="goToHotel('${c}')" class="bg-white border-2 border-blue-200 rounded-3xl p-6 shadow-md active:bg-blue-100 transition-colors flex flex-col items-center justify-center gap-2">
                        <span class="text-4xl">🏨</span>
                        <span class="text-xl font-black text-gray-800 break-words w-full">${c}</span>
                    </button>
                `).join('');
            } else {
                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-500 font-bold text-xl">找不到飯店「${keyword}」</div>`;
            }
        }

        function goToHotel(hotelName) {
            if (!hotelName) return;
            currentHotelName = hotelName;
            
            // 切換畫面
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('hotelView').classList.remove('hidden');
            
            // 更新標題並清空選單防止殘留
            document.getElementById('currentHotelTitle').innerText = hotelName;
            document.getElementById('homeSelect').value = ""; 
            
            renderItems();
        }

        function goHome() {
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('hotelView').classList.add('hidden');
            document.getElementById('searchInput').value = "";
            renderHome();
        }

        // ================= 【內頁邏輯】 =================
        function dateChanged() { updateDateDisplay(); if(currentHotelName) renderItems(); }
        function updateDateDisplay() {
            const d = new Date(document.getElementById('datePicker').value);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function handleInput(date, category, item, field, value) {
            if (!userInputs[date]) userInputs[date] = {};
            if (!userInputs[date][category]) userInputs[date][category] = {};
            if (!userInputs[date][category][item]) userInputs[date][category][item] = { count: '', note: '', hasSigned: false, isSubmitted: false, signature: '' };
            userInputs[date][category][item][field] = value;
        }

        // 🌟 新增臨時品項功能
        function addNewItem() {
            const inputEl = document.getElementById('newItemInput');
            const newItemName = inputEl.value.trim();
            
            if (!newItemName) {
                showMessage("請輸入要新增的品項名稱喔！");
                return;
            }

            // 檢查是否已存在
            const exists = masterData.some(d => d.hotel === currentHotelName && d.item === newItemName);
            if (exists) {
                showMessage("這個品項已經在列表裡面囉！");
                return;
            }

            // 加到主資料庫中
            masterData.push({ hotel: currentHotelName, item: newItemName });
            inputEl.value = ""; // 清空輸入框
            
            showToast("✅ 已為您新增品項！");
            renderItems(); // 重新繪製列表
            
            // 自動滑動到最底部的列表 (新增的通常在最後面)
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function handleItemClick(item) {
            const dateStr = document.getElementById('datePicker').value;
            const hasSigned = userInputs[dateStr]?.[currentHotelName]?.[item]?.hasSigned;
            
            if (!hasSigned) {
                openSign(currentHotelName, item);
                return; 
            }
            openCalc(currentHotelName, item);
        }

        function renderItems() {
            const dateStr = document.getElementById('datePicker').value;
            if (!currentHotelName) return;

            const filteredData = masterData.filter(d => d.hotel === currentHotelName);
            document.getElementById('itemsList').innerHTML = filteredData.map(d => {
                const count = userInputs[dateStr]?.[d.hotel]?.[d.item]?.count || '';
                const note = userInputs[dateStr]?.[d.hotel]?.[d.item]?.note || '';
                const hasSigned = userInputs[dateStr]?.[d.hotel]?.[d.item]?.hasSigned || false;
                const isSubmitted = userInputs[dateStr]?.[d.hotel]?.[d.item]?.isSubmitted || false;
                
                let actionButton = "";
                let numDisplayClass = hasSigned ? "bg-white text-blue-700 border-blue-500 shadow-inner" : "bg-gray-100 text-gray-400 border-gray-300";
                let numText = count !== "" ? count : (hasSigned ? "點此輸入" : "第一步簽名");

                if (isSubmitted && !hasSigned) {
                    actionButton = `<div class="w-full py-3 bg-green-50 text-green-700 rounded-xl font-bold text-lg text-center border border-green-200 shadow-sm">✅ 已存檔 (修改請點上方重簽)</div>`;
                } else if (hasSigned) {
                    actionButton = `<div class="w-full py-3 bg-orange-50 text-orange-600 rounded-xl font-bold text-lg text-center border border-orange-200 animate-pulse">👆 請點擊上方數量框輸入數字</div>`;
                } else {
                    actionButton = `<button onclick="openSign('${d.hotel}', '${d.item}')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black shadow-md text-xl active:bg-blue-700">✍️ 點此簽名解鎖輸入</button>`;
                }

                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-200 relative overflow-hidden">
                    ${!hasSigned ? '<div class="absolute inset-0 bg-gray-50/50 pointer-events-none z-10"></div>' : ''}
                    
                    <div class="flex justify-between items-center mb-4 relative z-20">
                        <span class="font-black text-3xl text-gray-800">${d.item}</span>
                        <div onclick="handleItemClick('${d.item}')" class="px-5 py-3 text-right font-black text-3xl border-b-4 rounded-t-lg cursor-pointer min-w-[100px] ${numDisplayClass}">
                            ${numText}
                        </div>
                    </div>
                    
                    <input type="text" 
                        oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'note', this.value)"
                        onchange="if(${hasSigned}) submitItemToServer('${d.hotel}', '${d.item}')"
                        value="${note}" 
                        ${!hasSigned ? 'disabled' : ''}
                        class="w-full p-4 mb-5 border border-gray-300 rounded-xl text-lg font-bold outline-none focus:border-blue-500 bg-gray-50 relative z-20" 
                        placeholder="${hasSigned ? "有短少或破損？寫完點旁邊自動存" : "🔒 解鎖後可寫備註"}">
                    
                    <div class="relative z-20">
                        ${actionButton}
                    </div>
                </div>`;
            }).join('');
        }

        // ================= 【簽名板與計算機邏輯】 =================
        function setupCanvas() {
            canvas.isModified = false;
            canvas.isLocked = false; 

            function start(e) { 
                if (canvas.isLocked) {
                    showMessage("🔒 必須重新簽名才能修改數量喔！\n👉 請先點擊右上角的【清除重寫】按鈕。");
                    return;
                }
                painting = true; draw(e); 
            }
            function draw(e) {
                if(!painting) return; e.preventDefault(); 
                canvas.isModified = true;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            }
            function stop() { painting = false; ctx.beginPath(); }
            
            canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);
        }
        setupCanvas();

        function clearCanvas() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            canvas.isModified = true; 
            canvas.isLocked = false; 
            const titleEl = document.getElementById('signModalTitle');
            titleEl.innerText = "✍️ 請簽上新名字";
            titleEl.className = "text-lg font-black text-blue-800";
        }

        function closeSign() { document.getElementById('signModal').classList.add('hidden'); }
        
        function openSign(category, item) { 
            activeCategory = category; activeItem = item; 
            document.getElementById('signModal').classList.remove('hidden'); 

            const dateStr = document.getElementById('datePicker').value;
            const existingSig = userInputs[dateStr]?.[category]?.[item]?.signature;
            const isSubmitted = userInputs[dateStr]?.[category]?.[item]?.isSubmitted;

            requestAnimationFrame(() => {
                canvas.width = canvas.offsetWidth; canvas.height = 220;
                canvas.isModified = false; 
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; 
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                canvas.isLocked = (isSubmitted && existingSig) ? true : false;
                const titleEl = document.getElementById('signModalTitle');
                if (canvas.isLocked) {
                    titleEl.innerText = "🔒 請先按【清除重寫】才能修改";
                    titleEl.className = "text-lg font-black text-red-600 animate-pulse";
                } else {
                    titleEl.innerText = "✍️ 簽名解鎖輸入框";
                    titleEl.className = "text-lg font-black text-blue-800";
                }

                if (existingSig) {
                    let img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = existingSig;
                }
            });
        }

        function confirmSignature() {
            if (canvas.isLocked) {
                return showMessage("🔒 您尚未重新簽名！\n👉 請先點擊右上角的【清除重寫】並簽名，才能解鎖修改。");
            }
            let isBlank = !ctx.getImageData(0,0,canvas.width,canvas.height).data.some(c => c !== 0);
            if (isBlank) {
                return showMessage("請先在空白處簽名，才能解鎖輸入框喔！");
            }

            let sigBase64 = canvas.toDataURL();
            const dateStr = document.getElementById('datePicker').value;
            handleInput(dateStr, activeCategory, activeItem, 'signature', sigBase64);
            handleInput(dateStr, activeCategory, activeItem, 'hasSigned', true); 
            handleInput(dateStr, activeCategory, activeItem, 'isSubmitted', false); 
            
            closeSign();
            renderItems(); 
            openCalc(activeCategory, activeItem); 
        }

        function openCalc(hotel, item) {
            activeCategory = hotel; activeItem = item;
            const dateStr = document.getElementById('datePicker').value;
            document.getElementById('calcTitle').innerText = `正在計算：${item}`;
            
            calcExpr = String(userInputs[dateStr]?.[hotel]?.[item]?.count || "");
            if(calcExpr === "0") calcExpr = "";
            document.getElementById('calcDisplay').innerText = calcExpr || "0";
            
            document.getElementById('calcModal').classList.remove('translate-y-full');
        }

        function closeCalc() {
            document.getElementById('calcModal').classList.add('translate-y-full');
        }

        function calcPress(val) {
            calcExpr += val;
            document.getElementById('calcDisplay').innerText = calcExpr;
        }

        function calcBackspace() {
            calcExpr = calcExpr.slice(0, -1);
            document.getElementById('calcDisplay').innerText = calcExpr || "0";
        }

        function calcClear() {
            calcExpr = "";
            document.getElementById('calcDisplay').innerText = "0";
        }

        function calcConfirm() {
            let finalValue = 0;
            try {
                if (/^[0-9\+\-]+$/.test(calcExpr)) {
                    finalValue = eval(calcExpr); 
                } else {
                    finalValue = parseInt(calcExpr) || 0;
                }
            } catch (e) { finalValue = 0; }

            const dateStr = document.getElementById('datePicker').value;
            handleInput(dateStr, activeCategory, activeItem, 'count', finalValue);
            
            closeCalc();
            renderItems(); 
            submitItemToServer(activeCategory, activeItem);
        }

        function submitItemToServer(category, item) {
            const dateStr = document.getElementById('datePicker').value;
            const countVal = userInputs[dateStr]?.[category]?.[item]?.count || 0;
            const noteVal = userInputs[dateStr]?.[category]?.[item]?.note || '';
            const sigBase64 = userInputs[dateStr]?.[category]?.[item]?.signature || '';
            
            if(!countVal || countVal === "0" || String(countVal).trim() === "") return; 
            if(!sigBase64) return; 

            const payload = { 
                type: 'inventory', date: dateStr, hotel: category, item: item, 
                count: countVal, note: noteVal, signature: sigBase64, timestamp: new Date().toLocaleString() 
            };
            
            fetch(API_URL, { 
                method: 'POST', mode: 'no-cors',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            })
            .then(() => {
                handleInput(dateStr, category, item, 'isSubmitted', true); 
                handleInput(dateStr, category, item, 'hasSigned', false); 
                renderItems();
                showToast("✅ 數量已自動儲存！");
            }).catch(e => {
                handleInput(dateStr, category, item, 'isSubmitted', true); 
                handleInput(dateStr, category, item, 'hasSigned', false); 
                renderItems();
            });
        }
        
        init();
    </script>
</body>
</html>
