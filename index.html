<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body class="p-3 pb-32 relative">
    
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000]">
        已成功寫入資料庫！
    </div>

    <div class="main-container">
        <div class="flex justify-between items-center mb-4 mt-2 px-1">
            <h1 class="text-2xl font-bold text-gray-800">布品盤點系統</h1>
            <button onclick="init()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg font-bold text-sm shadow-sm">
                🔄 雲端同步
            </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-col gap-3">
            <div class="relative w-full bg-gray-100 rounded-lg h-14 flex items-center justify-center border border-gray-200">
                <div id="dateDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="dateChanged()">
            </div>
            
            <!-- 搜尋框 -->
            <div class="relative w-full h-14">
                <span class="absolute left-3 top-4 text-gray-400 text-xl">🔍</span>
                <input id="searchInput" class="w-full h-full border border-gray-300 rounded-lg text-lg pl-10 pr-4 outline-none" placeholder="搜尋飯店或部門..." oninput="filterHotels()">
            </div>

            <div class="relative w-full bg-blue-50 border border-blue-200 rounded-lg h-14 flex items-center justify-center overflow-hidden">
                <div id="hotelDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-blue-800">載入中...</div>
                <select id="hotelSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="document.getElementById('hotelDisplay').innerText = this.options[this.selectedIndex].text; renderItems()">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <div id="itemsList" class="space-y-3">
            <div class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>
        </div>
    </div>

    <!-- 簽名板 Modal -->
    <div id="signModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-gray-800">確認數量並簽名</h2>
                <button onclick="clearCanvas()" class="text-sm text-red-500 font-bold px-2 py-1 rounded">清除重寫</button>
            </div>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4">
                <button id="submitBtn" onclick="submitData()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md">確定傳送</button>
            </div>
        </div>
    </div>

    <script>
        // ★★★ 請替換成最新的 API_URL ★★★
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";
        
        let masterData = []; 
        let userInputs = {}; 
        let allCategories = []; 
        let activeCategory = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            document.getElementById('datePicker').value = getLocalDateString(new Date());
            updateDateDisplay();
            
            try {
                const res = await fetch(`${API_URL}?action=getInventoryData&t=${new Date().getTime()}`);
                const data = await res.json();
                
                masterData = data.template || [];
                if (masterData.length === 0) throw new Error("「基礎設定」沒有資料");
                
                if (data.records) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        userInputs[r.date][r.hotel][r.item] = { count: r.count, note: r.note, hasSigned: true };
                    });
                }
                allCategories = [...new Set(masterData.map(d => d.hotel))];
                filterHotels(); 
            } catch (error) {
                document.getElementById('itemsList').innerHTML = `<div class="text-red-500 text-center mt-6">讀取失敗：${error.message}</div>`;
            }
        }

        function dateChanged() { updateDateDisplay(); renderItems(); }
        function updateDateDisplay() {
            const d = new Date(document.getElementById('datePicker').value);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function filterHotels() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = allCategories.filter(c => c.toLowerCase().includes(keyword));
            const select = document.getElementById('hotelSelect');
            if (filtered.length > 0) {
                select.innerHTML = filtered.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('hotelDisplay').innerText = filtered[0];
            } else {
                select.innerHTML = '<option value="">無符合結果</option>';
                document.getElementById('hotelDisplay').innerText = "無符合結果";
            }
            renderItems();
        }

        function handleInput(date, category, item, field, value) {
            if (!userInputs[date]) userInputs[date] = {};
            if (!userInputs[date][category]) userInputs[date][category] = {};
            if (!userInputs[date][category][item]) userInputs[date][category][item] = { count: '', note: '', hasSigned: false };
            userInputs[date][category][item][field] = value;
        }

        function renderItems() {
            const dateStr = document.getElementById('datePicker').value;
            const cat = document.getElementById('hotelSelect').value;
            if (!cat) return;

            const filteredData = masterData.filter(d => d.hotel === cat);
            document.getElementById('itemsList').innerHTML = filteredData.map(d => {
                const count = userInputs[dateStr]?.[d.hotel]?.[d.item]?.count || '';
                const note = userInputs[dateStr]?.[d.hotel]?.[d.item]?.note || '';
                const isSigned = userInputs[dateStr]?.[d.hotel]?.[d.item]?.hasSigned;
                const btnClass = isSigned ? 'bg-green-600' : 'bg-blue-600';
                const btnText = isSigned ? '✅ 已盤點送出 (點擊修改)' : '簽名並送出';
                
                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-2xl text-gray-900">${d.item}</span>
                        <input type="text" inputmode="numeric" oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'count', this.value)" value="${count}" class="w-20 p-1 text-right font-black text-2xl border-b-2 border-blue-400 bg-transparent outline-none text-blue-600" placeholder="0">
                    </div>
                    <input type="text" oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'note', this.value)" value="${note}" class="w-full p-2 mb-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none" placeholder="有破損或短少？請寫備註...">
                    <button onclick="openSign('${d.hotel}', '${d.item}')" class="w-full py-2 ${btnClass} text-white rounded-lg font-bold shadow-sm">${btnText}</button>
                </div>`;
            }).join('');
        }

        function setupCanvas() {
            function start(e) { painting = true; draw(e); }
            function draw(e) {
                if(!painting) return; e.preventDefault(); 
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            }
            function stop() { painting = false; ctx.beginPath(); }
            canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);
        }
        setupCanvas();

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function closeSign() { document.getElementById('signModal').classList.add('hidden'); }
        function openSign(category, item) { 
            activeCategory = category; activeItem = item; 
            document.getElementById('signModal').classList.remove('hidden'); 
            requestAnimationFrame(() => {
                canvas.width = canvas.offsetWidth; canvas.height = 220;
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; clearCanvas();
            });
        }

        function submitData() {
            const dateStr = document.getElementById('datePicker').value;
            const countVal = userInputs[dateStr]?.[activeCategory]?.[activeItem]?.count || 0;
            const noteVal = userInputs[dateStr]?.[activeCategory]?.[activeItem]?.note || '';
            
            if(!countVal || countVal === "0") return alert("請先填寫盤點數量！");
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            const payload = { type: 'inventory', date: dateStr, hotel: activeCategory, item: activeItem, count: countVal, note: noteVal, timestamp: new Date().toLocaleString() };
            
            // ★ 防護網：強制使用 text/plain 防止 Google 阻擋
            fetch(API_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            })
            .then(res => res.json())
            .then(data => {
                btn.innerText = "確定傳送"; btn.disabled = false;
                if(data.status === "success") {
                    handleInput(dateStr, activeCategory, activeItem, 'hasSigned', true);
                    closeSign(); renderItems();
                    const toast = document.getElementById('toast');
                    toast.classList.remove('opacity-0'); setTimeout(() => toast.classList.add('opacity-0'), 2000);
                } else {
                    alert("寫入後台失敗: " + data.message);
                }
            })
            .catch(err => {
                btn.innerText = "確定傳送"; btn.disabled = false;
                alert("網路傳送失敗，請確認網址！");
            });
        }
        init();
    </script>
</body>
</html>
