<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布品盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-center">布品盤點系統</h1>
        <div id="ui-container"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwJv-qdQcoqowK1JYqSttVGYiSh0nW-SO1-6N_D9pSHok36i7XMt_uL_oRMKJGxFWw/exec";
        let masterData = [];

        async function init() {
            const res = await fetch(`${API_URL}?action=getData`);
            masterData = await res.json();
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('ui-container');
            const hotels = [...new Set(masterData.map(d => d.hotel))];
            
            container.innerHTML = `
                <div class="bg-white p-3 rounded-xl shadow-sm mb-4 space-y-2">
                    <select id="hotelSelect" class="w-full p-2 border rounded" onchange="renderItems()">
                        ${hotels.map(h => `<option value="${h}">${h}</option>`).join('')}
                    </select>
                    <input id="searchInput" class="w-full p-2 border rounded" placeholder="搜尋品項..." oninput="renderItems()">
                </div>
                <div id="itemsList" class="space-y-3"></div>
            `;
            renderItems();
        }

        function renderItems() {
            const hotel = document.getElementById('hotelSelect').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('itemsList');
            const filtered = masterData.filter(d => d.hotel === hotel && d.item.toLowerCase().includes(search));
            
            list.innerHTML = filtered.map(d => `
                <div class="bg-white p-4 rounded-xl flex items-center justify-between">
                    <span class="font-bold">${d.item}</span>
                    <input type="number" class="w-20 border rounded p-1 count-input" data-item="${d.item}">
                    <button onclick="alert('簽名板功能已準備就緒')" class="p-2 bg-blue-600 text-white rounded">✍️</button>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
