<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
        
        /* 專屬計算機鍵盤的滑動動畫 */
        #calcModal { transition: transform 0.3s ease-in-out; }
        .calc-btn { user-select: none; transition: background 0.1s; }
        .calc-btn:active { background-color: #d1d5db; transform: scale(0.95); }
    </style>
</head>
<body class="p-3 pb-32 relative overflow-x-hidden">
    
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-green-700 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000] font-bold">
        ✅ 數量已自動儲存！
    </div>

    <div class="main-container">
        <div class="flex justify-between items-center mb-4 mt-2 px-1">
            <h1 class="text-2xl font-bold text-gray-800">布品盤點系統</h1>
            <button onclick="init()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg font-bold text-sm shadow-sm active:bg-blue-200">
                🔄 雲端同步
            </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-col gap-3 border border-gray-200">
            <div class="relative w-full bg-gray-100 rounded-lg h-14 flex items-center justify-center border border-gray-200">
                <div id="dateDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="dateChanged()">
            </div>
            
            <div class="relative w-full h-14">
                <span class="absolute left-3 top-4 text-gray-400 text-xl">🔍</span>
                <input id="searchInput" class="w-full h-full border border-gray-300 rounded-lg text-lg pl-10 pr-4 outline-none" placeholder="搜尋飯店或部門..." oninput="filterHotels()">
            </div>

            <div class="relative w-full bg-blue-50 border border-blue-200 rounded-lg h-14 flex items-center justify-center overflow-hidden">
                <div id="hotelDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-blue-800">載入中...</div>
                <select id="hotelSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="document.getElementById('hotelDisplay').innerText = this.options[this.selectedIndex].text; renderItems()">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <div id="itemsList" class="space-y-3 pb-10">
            <div class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>
        </div>
    </div>

    <!-- 簽名板 Modal (第一步：強制簽名) -->
    <div id="signModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-black text-blue-800">✍️ 簽名解鎖輸入框</h2>
                <button onclick="clearCanvas()" class="text-sm text-red-500 font-bold px-2 py-1 rounded bg-red-50">清除重寫</button>
            </div>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4 flex gap-2">
                <button onclick="closeSign()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-lg">取消</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md">確認簽名</button>
            </div>
        </div>
    </div>

    <!-- 專屬底部計算機鍵盤 Modal -->
    <div id="calcModal" class="fixed inset-x-0 bottom-0 transform translate-y-full bg-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.2)] rounded-t-3xl z-[10001] max-w-md mx-auto">
        <div class="p-4">
            <div class="flex justify-between items-center mb-3">
                <span id="calcTitle" class="font-bold text-gray-500 text-sm">正在計算：床單</span>
                <button onclick="closeCalc()" class="text-red-500 font-bold px-3 py-1 bg-red-50 rounded-lg">關閉</button>
            </div>
            <!-- 算式顯示區 -->
            <div id="calcDisplay" class="w-full bg-white border-2 border-blue-400 rounded-xl h-16 mb-4 flex items-center justify-end px-4 text-3xl font-black text-gray-800 tracking-wider overflow-hidden">
                0
            </div>
            <!-- 鍵盤按鈕區 -->
            <div class="grid grid-cols-4 gap-2 h-64">
                <button onclick="calcPress('7')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">7</button>
                <button onclick="calcPress('8')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">8</button>
                <button onclick="calcPress('9')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">9</button>
                <button onclick="calcPress('+')" class="calc-btn bg-blue-100 text-blue-700 rounded-xl text-3xl font-bold shadow-sm border border-blue-200">＋</button>
                
                <button onclick="calcPress('4')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">4</button>
                <button onclick="calcPress('5')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">5</button>
                <button onclick="calcPress('6')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">6</button>
                <button onclick="calcPress('-')" class="calc-btn bg-red-100 text-red-700 rounded-xl text-3xl font-bold shadow-sm border border-red-200">－</button>
                
                <button onclick="calcPress('1')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">1</button>
                <button onclick="calcPress('2')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">2</button>
                <button onclick="calcPress('3')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">3</button>
                <button onclick="calcBackspace()" class="calc-btn bg-gray-200 text-gray-700 rounded-xl text-xl font-bold shadow-sm">退格</button>
                
                <button onclick="calcClear()" class="calc-btn bg-gray-200 text-gray-700 rounded-xl text-xl font-bold shadow-sm">清除</button>
                <button onclick="calcPress('0')" class="calc-btn bg-white rounded-xl text-2xl font-bold shadow-sm border border-gray-200">0</button>
                <button onclick="calcConfirm()" class="calc-btn col-span-2 bg-green-600 text-white rounded-xl text-xl font-bold shadow-sm">確定並儲存</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPrkLoz1QNrynxKK09CWgMNbuePWCmQdtmx8Iqwq9l90xk0ZGZSOc-N-bkTePyXb4RVA/exec";
        
        let masterData = []; 
        let userInputs = {}; 
        let allCategories = []; 
        let activeCategory = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        // 計算機變數
        let calcExpr = "";

        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            document.getElementById('datePicker').value = getLocalDateString(new Date());
            updateDateDisplay();
            
            try {
                const res = await fetch(`${API_URL}?action=getInventoryData&t=${new Date().getTime()}`);
                const data = await res.json();
                
                masterData = data.template || [];
                if (masterData.length === 0) throw new Error("後台無資料");
                
                if (data.records) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        
                        let isSub = r.count && String(r.count).trim() !== "" ? true : false;
                        
                        // ★ 載入時，只要是已經存檔過的資料，一律視為「未解鎖 (hasSigned=false)」
                        let hasSig = false; 

                        userInputs[r.date][r.hotel][r.item] = { 
                            count: r.count, 
                            note: r.note, 
                            hasSigned: hasSig, 
                            isSubmitted: isSub,
                            signature: r.signature || "" 
                        };
                    });
                }
                allCategories = [...new Set(masterData.map(d => d.hotel))];
                filterHotels(); 
            } catch (error) {
                document.getElementById('itemsList').innerHTML = `<div class="text-red-500 text-center mt-6 font-bold">同步失敗</div>`;
            }
        }

        function dateChanged() { updateDateDisplay(); renderItems(); }
        function updateDateDisplay() {
            const d = new Date(document.getElementById('datePicker').value);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function filterHotels() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = allCategories.filter(c => c.toLowerCase().includes(keyword));
            const select = document.getElementById('hotelSelect');
            if (filtered.length > 0) {
                select.innerHTML = filtered.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('hotelDisplay').innerText = filtered[0];
            } else {
                select.innerHTML = '<option value="">無符合結果</option>';
                document.getElementById('hotelDisplay').innerText = "無符合結果";
            }
            renderItems();
        }

        function handleInput(date, category, item, field, value) {
            if (!userInputs[date]) userInputs[date] = {};
            if (!userInputs[date][category]) userInputs[date][category] = {};
            if (!userInputs[date][category][item]) userInputs[date][category][item] = { count: '', note: '', hasSigned: false, isSubmitted: false, signature: '' };
            userInputs[date][category][item][field] = value;
        }

        // ★ 點擊數量框的防呆邏輯
        function handleItemClick(hotel, item) {
            const dateStr = document.getElementById('datePicker').value;
            const hasSigned = userInputs[dateStr]?.[hotel]?.[item]?.hasSigned;
            
            // 如果未簽名（或是送出後被鎖死），直接打開簽名板要求簽名
            if (!hasSigned) {
                openSign(hotel, item);
                return; 
            }
            
            // 如果已簽名解鎖，直接打開計算機
            openCalc(hotel, item);
        }

        function renderItems() {
            const dateStr = document.getElementById('datePicker').value;
            const cat = document.getElementById('hotelSelect').value;
            if (!cat) return;

            const filteredData = masterData.filter(d => d.hotel === cat);
            document.getElementById('itemsList').innerHTML = filteredData.map(d => {
                const count = userInputs[dateStr]?.[d.hotel]?.[d.item]?.count || '';
                const note = userInputs[dateStr]?.[d.hotel]?.[d.item]?.note || '';
                const hasSigned = userInputs[dateStr]?.[d.hotel]?.[d.item]?.hasSigned || false;
                const isSubmitted = userInputs[dateStr]?.[d.hotel]?.[d.item]?.isSubmitted || false;
                
                let actionButton = "";
                // 視覺樣式
                let numDisplayClass = hasSigned ? "bg-white text-blue-700 border-blue-500 shadow-inner" : "bg-gray-100 text-gray-400 border-gray-300";
                let numText = count !== "" ? count : (hasSigned ? "點此輸入" : "🔒 點此簽名");

                if (isSubmitted && !hasSigned) {
                    // 已存檔，且目前為鎖定狀態
                    actionButton = `<div class="w-full py-2 bg-green-50 text-green-700 rounded-lg font-bold text-center border border-green-200 shadow-sm">✅ 已存檔 (修改需點擊上方重新簽名)</div>`;
                } else if (hasSigned) {
                    // 已簽名解鎖，正在編輯
                    actionButton = `<div class="w-full py-2 bg-orange-50 text-orange-600 rounded-lg font-bold text-center border border-orange-200 animate-pulse">👆 請點擊上方數量框輸入數字</div>`;
                } else {
                    // 完全沒動過的初始狀態
                    actionButton = `<button onclick="openSign('${d.hotel}', '${d.item}')" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md text-lg">✍️ 點此簽名解鎖輸入框</button>`;
                }

                return `
                <div class="bg-white p-4 rounded-2xl shadow border border-gray-200 mb-4 relative overflow-hidden">
                    ${!hasSigned ? '<div class="absolute inset-0 bg-gray-50/50 pointer-events-none z-10"></div>' : ''}
                    
                    <div class="flex justify-between items-center mb-3 relative z-20">
                        <span class="font-black text-2xl text-gray-800">${d.item}</span>
                        <div onclick="handleItemClick('${d.hotel}', '${d.item}')" class="px-4 py-2 text-right font-black text-2xl border-b-4 rounded-t-lg cursor-pointer min-w-[80px] ${numDisplayClass}">
                            ${numText}
                        </div>
                    </div>
                    
                    <input type="text" 
                        oninput="handleInput('${dateStr}', '${d.hotel}', '${d.item}', 'note', this.value)"
                        onchange="if(${hasSigned}) submitItemToServer('${d.hotel}', '${d.item}')"
                        value="${note}" 
                        ${!hasSigned ? 'disabled' : ''}
                        class="w-full p-3 mb-4 border border-gray-200 rounded-xl text-base outline-none bg-gray-50 relative z-20" 
                        placeholder="${hasSigned ? "有短少或破損？寫完點旁邊自動存" : "🔒 解鎖後可寫備註"}">
                    
                    <div class="relative z-20">
                        ${actionButton}
                    </div>
                </div>`;
            }).join('');
        }

        // ================= 簽名板邏輯 =================
        function setupCanvas() {
            canvas.isModified = false;
            function start(e) { painting = true; draw(e); }
            function draw(e) {
                if(!painting) return; e.preventDefault(); 
                canvas.isModified = true;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            }
            function stop() { painting = false; ctx.beginPath(); }
            canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);
        }
        setupCanvas();

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.isModified = true; }
        function closeSign() { document.getElementById('signModal').classList.add('hidden'); }
        
        function openSign(category, item) { 
            activeCategory = category; activeItem = item; 
            document.getElementById('signModal').classList.remove('hidden'); 

            const dateStr = document.getElementById('datePicker').value;
            const existingSig = userInputs[dateStr]?.[category]?.[item]?.signature;

            requestAnimationFrame(() => {
                canvas.width = canvas.offsetWidth; canvas.height = 220;
                canvas.isModified = false; 
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; 
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 如果之前有簽名，自動帶入方便快速修改
                if (existingSig) {
                    let img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = existingSig;
                }
            });
        }

        // ★ 簽名完自動轉跳計算機
        function confirmSignature() {
            const dateStr = document.getElementById('datePicker').value;
            const existingSig = userInputs[dateStr]?.[activeCategory]?.[activeItem]?.signature || '';
            
            let isBlank = !ctx.getImageData(0,0,canvas.width,canvas.height).data.some(c => c !== 0);
            
            if (isBlank && !existingSig) {
                return alert("請先在空白處簽名，才能解鎖輸入框喔！");
            }

            let sigBase64 = isBlank ? existingSig : canvas.toDataURL();
            
            handleInput(dateStr, activeCategory, activeItem, 'signature', sigBase64);
            handleInput(dateStr, activeCategory, activeItem, 'hasSigned', true); // 標記為已簽名(解鎖)
            handleInput(dateStr, activeCategory, activeItem, 'isSubmitted', false); // 解除送出狀態，進入編輯模式
            
            closeSign();
            renderItems(); 
            
            // 自動開啟底部的計算機
            openCalc(activeCategory, activeItem);
        }

        // ================= 計算機鍵盤邏輯 =================
        function openCalc(hotel, item) {
            activeCategory = hotel; activeItem = item;
            const dateStr = document.getElementById('datePicker').value;
            document.getElementById('calcTitle').innerText = `正在計算：${item}`;
            
            calcExpr = String(userInputs[dateStr]?.[hotel]?.[item]?.count || "");
            if(calcExpr === "0") calcExpr = "";
            document.getElementById('calcDisplay').innerText = calcExpr || "0";
            
            document.getElementById('calcModal').classList.remove('translate-y-full');
        }

        function closeCalc() {
            document.getElementById('calcModal').classList.add('translate-y-full');
        }

        function calcPress(val) {
            calcExpr += val;
            document.getElementById('calcDisplay').innerText = calcExpr;
        }

        function calcBackspace() {
            calcExpr = calcExpr.slice(0, -1);
            document.getElementById('calcDisplay').innerText = calcExpr || "0";
        }

        function calcClear() {
            calcExpr = "";
            document.getElementById('calcDisplay').innerText = "0";
        }

        function calcConfirm() {
            let finalValue = 0;
            try {
                if (/^[0-9\+\-]+$/.test(calcExpr)) {
                    finalValue = eval(calcExpr); 
                } else {
                    finalValue = parseInt(calcExpr) || 0;
                }
            } catch (e) { finalValue = 0; }

            const dateStr = document.getElementById('datePicker').value;
            handleInput(dateStr, activeCategory, activeItem, 'count', finalValue);
            
            closeCalc();
            renderItems(); 
            
            submitItemToServer(activeCategory, activeItem);
        }

        // ================= 背景自動上傳邏輯 =================
        function submitItemToServer(category, item) {
            const dateStr = document.getElementById('datePicker').value;
            const countVal = userInputs[dateStr]?.[category]?.[item]?.count || 0;
            const noteVal = userInputs[dateStr]?.[category]?.[item]?.note || '';
            const sigBase64 = userInputs[dateStr]?.[category]?.[item]?.signature || '';
            
            if(!countVal || countVal === "0" || String(countVal).trim() === "") return; 
            if(!sigBase64) return; 

            const payload = { 
                type: 'inventory', date: dateStr, hotel: category, item: item, 
                count: countVal, note: noteVal, signature: sigBase64, timestamp: new Date().toLocaleString() 
            };
            
            fetch(API_URL, { 
                method: 'POST', mode: 'no-cors',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            })
            .then(() => {
                handleInput(dateStr, category, item, 'isSubmitted', true); 
                // ★ 送出成功後，強制將狀態改為未簽名 (鎖死欄位)
                handleInput(dateStr, category, item, 'hasSigned', false); 
                
                renderItems();
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0'); 
                setTimeout(() => toast.classList.add('opacity-0'), 2000);
            }).catch(e => {
                // 離線也先鎖死
                handleInput(dateStr, category, item, 'isSubmitted', true); 
                handleInput(dateStr, category, item, 'hasSigned', false); 
                renderItems();
                console.log("暫存本地等待連線");
            });
        }
        
        init();
    </script>
</body>
</html>
