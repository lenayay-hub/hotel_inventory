<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯店布品盤點</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .main-container { max-width: 500px; margin: 0 auto; }
        input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        #signCanvas { display: block; width: 100%; height: 220px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; cursor: crosshair; }
        .locked-card { opacity: 0.5; pointer-events: none; filter: grayscale(50%); }
    </style>
</head>
<body class="p-3 pb-32 relative">
    
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[10000]">
        已成功送出！
    </div>

    <div id="editScreen" class="main-container">
        
        <div class="flex justify-between items-center mb-4 mt-2 px-1">
            <h1 class="text-2xl font-bold text-gray-800">飯店布品盤點系統</h1>
            <button onclick="init()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg font-bold text-sm shadow-sm active:bg-blue-200 flex items-center gap-1">
                <span>🔄</span> 雲端同步
            </button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex flex-col gap-3 box-border">
            <div class="relative w-full bg-gray-200 rounded-lg h-14 flex items-center justify-center">
                <div id="dateDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <input type="date" id="datePicker" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer box-border" onchange="dateChanged()">
            </div>

            <div class="relative w-full bg-gray-200 rounded-lg h-14 flex items-center justify-center overflow-hidden">
                <div id="hotelDisplay" class="w-full text-center font-bold text-xl pointer-events-none text-black">載入中...</div>
                <select id="hotelSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="document.getElementById('hotelDisplay').innerText = this.options[this.selectedIndex].text; renderItems()">
                    <option value="">載入中...</option>
                </select>
            </div>
            
            <div class="relative w-full h-14">
                <span class="absolute left-3 top-4 text-gray-400 text-xl">🔍</span>
                <input id="searchInput" class="w-full h-full border border-gray-300 rounded-lg text-lg pl-10 pr-4 outline-none box-border" placeholder="搜尋飯店名稱..." oninput="renderItems()">
            </div>
        </div>

        <div id="itemsList" class="space-y-3">
            <div id="loadingStatus" class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>
        </div>

        <div class="bg-white p-4 rounded-xl border-2 border-dashed border-gray-300 mt-5 mb-5">
            <h2 class="font-bold text-sm mb-2 text-gray-700">新增臨時品項</h2>
            <div class="flex gap-2">
                <input id="newItemInput" class="flex-1 p-2 border rounded-md text-base" placeholder="布品名稱">
                <button onclick="addNewItem()" class="p-2 bg-green-600 text-white rounded-md font-bold text-sm px-4">新增</button>
            </div>
        </div>

        <button onclick="showPreview()" class="w-full p-4 bg-gray-800 text-white rounded-xl font-bold text-lg shadow-lg mb-8">
            📸 產生今日截圖預覽
        </button>
    </div>

    <div id="previewScreen" class="hidden fixed inset-0 bg-white z-[9999] overflow-y-auto">
        <div class="p-4 flex justify-between items-center border-b border-gray-200 bg-gray-50">
            <button onclick="hidePreview()" class="text-blue-600 font-bold text-lg px-2 py-1">← 返回編輯</button>
            <span class="text-gray-400 text-sm">請直接使用手機截圖</span>
        </div>
        <div id="previewContent" class="p-6 max-w-md mx-auto bg-white min-h-screen"></div>
    </div>

    <div id="signModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[10000]" onclick="if(event.target === this) closeSign()">
        <div class="bg-white p-4 rounded-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-gray-800">請在下方簽名</h2>
                <button onclick="clearCanvas()" class="text-sm text-red-500 font-bold px-2 py-1 active:bg-red-50 rounded">清除重寫</button>
            </div>
            <canvas id="signCanvas"></canvas>
            <div class="mt-4">
                <button onclick="submitData()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md active:bg-blue-800">確定傳送</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyu3rnmGsiDhjeLKOZISon2GKnZPCVy31v9YsC3NDQGsYX8QtcLf09N9_6XQqJ6ymgS/exec";
        
        let masterData = [];
        let userInputs = {}; 
        let activeHotel = ""; 
        let activeItem = "";
        
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function getLocalDateString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function init() {
            setupDateLimits();
            const listDiv = document.getElementById('itemsList');
            listDiv.innerHTML = '<div class="text-center py-10 text-gray-500 font-bold text-lg">雲端資料同步中...</div>';
            
            try {
                // ★ 更改：呼叫專屬的盤點資料接口 getInventoryData
                const noCacheUrl = `${API_URL}?action=getInventoryData&t=${new Date().getTime()}`;
                const res = await fetch(noCacheUrl);
                
                if (!res.ok) throw new Error(`連線錯誤狀態碼: ${res.status}`);
                
                const data = await res.json();
                
                if (data.template && Array.isArray(data.template)) {
                    masterData = data.template;
                } else if (data.data && Array.isArray(data.data)) {
                    masterData = data.data;
                } else if (Array.isArray(data)) {
                    masterData = data;
                } else {
                    throw new Error("回傳格式不正確");
                }

                if (masterData.length === 0) throw new Error("「基礎設定」內沒有找到飯店資料");
                
                if (data.records && Array.isArray(data.records)) {
                    data.records.forEach(r => {
                        if(!userInputs[r.date]) userInputs[r.date] = {};
                        if(!userInputs[r.date][r.hotel]) userInputs[r.date][r.hotel] = {};
                        
                        const existingSign = userInputs[r.date][r.hotel][r.item]?.signature || '';
                        userInputs[r.date][r.hotel][r.item] = { count: r.count, note: r.note, signature: existingSign };
                    });
                }

                const hotels = [...new Set(masterData.map(d => d.hotel))];
                const hotelSelect = document.getElementById('hotelSelect');
                const hotelDisplay = document.getElementById('hotelDisplay');
                
                if (hotels.length > 0 && !hotelSelect.value) {
                    hotelSelect.innerHTML = hotels.map(h => `<option value="${h}">${h}</option>`).join('');
                    hotelSelect.value = hotels[0]; 
                    hotelDisplay.innerText = hotels[0];
                } else if (hotels.length > 0) {
                    hotelSelect.innerHTML = hotels.map(h => `<option value="${h}">${h}</option>`).join('');
                    hotelDisplay.innerText = hotelSelect.options[hotelSelect.selectedIndex]?.text || hotels[0];
                } else {
                    hotelDisplay.innerText = "無選項";
                }
                
                renderItems();
            } catch (error) {
                listDiv.innerHTML = `
                    <div class="text-red-500 mb-2 text-center mt-6">讀取失敗 😭</div>
                    <div class="text-sm text-gray-500 px-4 text-center">${error.message}</div>
                    <div class="text-center"><button onclick="init()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold">點我重試</button></div>
                `;
            }
        }

        function setupDateLimits() {
            const today = new Date();
            const prevMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            const nextMonth = new Date(today.getFullYear(), today.getMonth() + 2, 0); 
            
            const dp = document.getElementById('datePicker');
            dp.min = getLocalDateString(prevMonth);
            dp.max = getLocalDateString(nextMonth);
            dp.value = getLocalDateString(today);
            updateDateDisplay();
        }

        function dateChanged() { updateDateDisplay(); renderItems(); }
        function updateDateDisplay() {
            const dateVal = document.getElementById('datePicker').value;
            if(!dateVal) return;
            const d = new Date(dateVal);
            document.getElementById('dateDisplay').innerText = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function isLocked() {
            const selected = new Date(document.getElementById('datePicker').value);
            const today = new Date();
            today.setHours(0,0,0,0); selected.setHours(0,0,0,0);
            return ((today - selected) / 86400000) > 2;
        }
